project_name: "test"
station_name: "test_station"
series: "c"
time_resolution: "1d"
version: 8
Tice_cover: 0.0
objective_function: "NSE"
integrator: "RK4"
run_mode: "DE-MCMC"
prc: 1.0

paths:
  input_data: "examples/Pukeokahu/Pukeokahu_merged.csv"
  output_dir: "examples/Pukeokahu/output"

optimization:
  n_runs: 5
  mineff_index: -999.0
  n_particles: 5
  c1: 2.0
  c2: 2.0
  wmax: 0.9
  wmin: 0.4
  mcmc_walkers: 32
  mcmc_steps: 10

parameter_bounds:
  min: [-20.0, 0.0, 0.0, 0.0, -20.0, 0.0, 0.0, 0.0]
  max: [20.0, 2.0, 5.0, 1.0, 20.0, 20.0, 1.0, 5.0]

sensitivity_analysis: false
gap_tolerant: true
